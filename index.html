    <style>
        /* Paleta de Cores Identidade Visual */
        :root {
            --bg-color: #94a78a; 
            --text-color: #ffffff;
            --primary-color: #2b3b2b; 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--primary-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Cabeçalho do Perfil */
        .profile-section {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 400px;
        }

        .profile-img-container {
            width: 110px;
            height: 110px;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            background-color: var(--primary-color); 
            border: 3px solid #ffffff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            transform: scale(1.1); 
        }

        .profile-title {
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        .profile-subtitle {
            font-size: 0.9rem;
            font-weight: 700;
            color: #ffffff;
            margin-top: 8px;
            line-height: 1.4;
        }

        /* Container dos Cards */
        .links-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Estilo dos Cards */
        .card {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            text-decoration: none;
            color: white;
            height: 140px; 
            border-radius: 16px;
            padding: 20px;
            overflow: hidden;
            border: 2px solid var(--primary-color);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card:active {
            transform: scale(0.98);
        }

        /* NOVAS IMAGENS DE FUNDO DOS CARDS */
        .card-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .bg-1 { background-image: url('https://i.ibb.co/bjgV4wCS/capa-atualizada-yr.png'); background-color: var(--primary-color); }
        .bg-2 { background-image: url('https://i.ibb.co/Kck0sqc9/capa-atualizada.png'); background-color: var(--primary-color); }
        .bg-3 { background-image: url('https://i.ibb.co/jksRt0Px/capa-atualizawp.png'); background-color: var(--primary-color); }

        /* Gradiente mantido leve para não ofuscar as novas artes */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, rgba(15, 20, 15, 0.7) 0%, rgba(15, 20, 15, 0) 60%);
            z-index: 2;
        }

        .card-content {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            width: 100%;
        }

        .btn-acessar {
            align-self: flex-end;
            background-color: #ffffff;
            color: var(--primary-color);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 4px;
            text-transform: uppercase;
        }

        /* --- SESSÃO DO CARROSSEL DE PROVA SOCIAL --- */
        .carousel-section {
            width: 100%;
            max-width: 500px;
            margin-top: 35px;
            text-align: center;
            overflow: hidden;
        }

        .carousel-title {
            font-size: 0.85rem;
            color: #ffffff;
            margin-bottom: 12px;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 0.5px;
            opacity: 0.9;
        }

        .carousel-container {
            width: 100%;
            overflow: hidden;
            position: relative;
            /* Máscara para suavizar as bordas (fade effect) */
            -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
            mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
        }

        .carousel-track {
            display: flex;
            gap: 15px;
            width: max-content;
            /* A animação leva 15s para dar uma volta completa, de forma linear e infinita */
            animation: scroll-logos 15s linear infinite;
        }

        .carousel-track img {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-color);
            background-color: #ffffff;
        }

        @keyframes scroll-logos {
            0% { transform: translateX(0); }
            /* Desloca exatamente a metade do conteúdo (que foi duplicado) para criar o loop perfeito */
            100% { transform: translateX(calc(-50% - 7.5px)); }
        }
