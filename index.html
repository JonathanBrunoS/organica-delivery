    <style>
        /* Paleta de Cores Identidade Visual */
        :root {
            --bg-color: #94a78a; 
            --text-color: #ffffff;
            --primary-color: #2b3b2b; 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--primary-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Cabeçalho do Perfil */
        .profile-section {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 400px;
        }

        .profile-img-container {
            width: 110px;
            height: 110px;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            background-color: var(--primary-color); 
            border: 3px solid #ffffff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            transform: scale(1.1); 
        }

        .profile-title {
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        .profile-subtitle {
            font-size: 0.9rem;
            font-weight: 700;
            color: #ffffff;
            margin-top: 8px;
            line-height: 1.4;
        }

        /* Container dos Cards */
        .links-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Estilo dos Cards */
        .card {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            text-decoration: none;
            color: white;
            height: 140px; 
            border-radius: 16px;
            padding: 20px;
            overflow: hidden;
            border: 2px solid var(--primary-color);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card:active {
            transform: scale(0.98);
        }

        /* Imagens de fundo das capas definitivas atualizadas */
        .card-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .bg-1 { background-image: url('https://i.ibb.co/zv9DBFd/Banners-Organica-youtube.png'); background-color: var(--primary-color); }
        .bg-2 { background-image: url('https://i.ibb.co/pB4jZtLf/Banners-Organica-Gest-o-ifood.png'); background-color: var(--primary-color); }
        .bg-3 { background-image: url('https://i.ibb.co/b5PBWqYp/Banners-Organica-Whatsapp.png'); background-color: var(--primary-color); }

        /* Gradiente mantido levemente para não ofuscar as novas artes, mas o suficiente para destacar o botão */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, rgba(15, 20, 15, 0.7) 0%, rgba(15, 20, 15, 0) 60%);
            z-index: 2;
        }

        .card-content {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            width: 100%;
        }

        .btn-acessar {
            align-self: flex-end;
            background-color: #ffffff;
            color: var(--primary-color);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 4px;
            text-transform: uppercase;
        }
        
    </style>
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TH8TBRML"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <!-- Meta Pixel Noscript -->
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=856953836807238&ev=PageView&noscript=1"
    /></noscript>

    <!-- Seção de Perfil -->
    <div class="profile-section">
        <div class="profile-img-container">
            <img src="https://i.ibb.co/YBbv2Gsj/image.png" alt="Logo Orgânica Delivery" class="profile-img">
        </div>
        <h1 class="profile-title">@organica.delivery_</h1>
        <p class="profile-subtitle">Empresa focada em ajudar seu delivery a crescer de forma consistente e com método definido de qualquer lugar do Brasil</p>
    </div>

    <!-- Lista de Links em Cards (Sem os títulos em HTML) -->
    <div class="links-container">
        
        <!-- CARD 1: YOUTUBE -->
        <a href="https://www.youtube.com/@organica.delivery" class="card" target="_blank" onclick="trackClick('clique_youtube')">
            <div class="card-bg bg-1"></div>
            <div class="overlay"></div>
            <div class="card-content">
                <div class="btn-acessar">Acessar &rarr;</div>
            </div>
        </a>

        <!-- CARD 2: FORMULÁRIO -->
        <a href="https://form.respondi.app/Rxu39nGk" class="card" target="_blank" onclick="trackClick('clique_formulario')">
            <div class="card-bg bg-2"></div>
            <div class="overlay"></div>
            <div class="card-content">
                <div class="btn-acessar">Acessar &rarr;</div>
            </div>
        </a>

        <!-- CARD 3: WHATSAPP -->
        <a href="https://wa.me/554388278661?text=Ol%C3%A1%2C%20vim%20pelo%20link%20da%20bio%20e%20gostaria%20de%20falar%20com%20a%20equipe!" class="card" target="_blank" onclick="trackClick('clique_whatsapp')">
            <div class="card-bg bg-3"></div>
            <div class="overlay"></div>
            <div class="card-content">
                <div class="btn-acessar">Acessar &rarr;</div>
            </div>
        </a>

    </div>

    <!-- Script de Inteligência de Rastreamento -->
    <script>
        function trackClick(nomeDoEvento) {
            // 1. Envia para o dataLayer do Google Tag Manager
            window.dataLayer = window.dataLayer || [];
            window.dataLayer.push({
                'event': nomeDoEvento
            });
            
            // 2. Envia como evento customizado para o Meta Pixel
            if (typeof fbq === 'function') {
                fbq('trackCustom', nomeDoEvento);
            }

            console.log("Rastreamento Rocket executado para: " + nomeDoEvento);
        }
    </script>
</body>
</html>
